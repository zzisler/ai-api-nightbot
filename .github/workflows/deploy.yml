name: Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/ai-api-nightbot
            git pull
            docker build -t ai-api-nightbot .
            docker stop ai-api-nightbot || true
            docker rm ai-api-nightbot || true
            docker run -d --name ai-api-nightbot -p 7777:7777 --restart=unless-stopped --env-file .env ai-api-nightbot